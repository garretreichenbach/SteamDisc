name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 0.1.0). Defaults to Directory.Build.props.'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Test
        run: dotnet test tests/SteamDisc.Tests/SteamDisc.Tests.csproj -c Release --nologo

      - name: Package
        shell: pwsh
        run: |
          $ver = "${{ github.event.inputs.version }}"
          if (-not $ver) { $ver = "${{ github.ref_name }}" }
          ./scripts/package.ps1 -Version $ver

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SteamDisc-win-x64
          path: dist/*.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $zip = Get-ChildItem dist/*.zip | Select-Object -First 1
          gh release create "${{ github.ref_name }}" $zip.FullName `
            --title "SteamDisc ${{ github.ref_name }}" `
            --notes "Self-contained Windows build. Run SteamDisc.exe to start."
