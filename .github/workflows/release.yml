name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 0.1.0). Defaults to Directory.Build.props.'
        required: false
      create_release:
        description: 'Also open a draft release (tags the current commit; needs a version)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rid: win-x64,   os: windows-latest }
          - { rid: linux-x64, os: ubuntu-latest }
          # Apple Silicon only for now: the Intel runner (macos-13) sits unclaimed in the queue.
          # To restore Intel coverage, add { rid: osx-x64, os: macos-latest } — publishing the
          # x64 runtime pack cross-RID from an arm64 runner works, it just can't be smoke-tested.
          - { rid: osx-arm64, os: macos-latest }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # The suite targets the Windows-first paths; running it once is enough to gate a release.
      - name: Test
        if: matrix.os == 'windows-latest'
        run: dotnet test tests/SteamDisc.Tests/SteamDisc.Tests.csproj -c Release --nologo

      # Each platform is packaged on its own OS so the executable bit survives in the tarball.
      - name: Package
        shell: pwsh
        run: |
          # Take the version from the dispatch input, else the tag. On a branch build there is
          # no meaningful version, so let the script read Directory.Build.props.
          $ver = "${{ github.event.inputs.version }}"
          if (-not $ver -and "${{ github.ref_type }}" -eq "tag") { $ver = "${{ github.ref_name }}" }
          if ($ver) { ./scripts/package.ps1 -Version $ver -Runtimes "${{ matrix.rid }}" }
          else      { ./scripts/package.ps1 -Runtimes "${{ matrix.rid }}" }

      # Transport between jobs only. GitHub always wraps an artifact in its own zip, so
      # downloading this from the Actions page gives zip-in-zip. The release assets below are
      # the real deliverable and are attached raw (single archive).
      - name: Upload bundle (intermediate)
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.rid }}
          path: |
            dist/*.zip
            dist/*.tar.gz
          if-no-files-found: error
          compression-level: 0

  release:
    name: Draft release
    needs: build
    # Tag pushes always release. A manual run can too, if you tick create_release.
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.create_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Left as a DRAFT on purpose: review the notes and assets, then publish by hand.
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # A tag push releases under that tag; a manual run tags the current commit.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
            if [ -z "$version" ]; then
              echo "::error::Set a version (e.g. 0.1.0) when ticking create_release."
              exit 1
            fi
            tag="v${version#v}"
          else
            tag="${{ github.ref_name }}"
          fi

          notes=$'Self-contained builds for Windows, Linux and macOS - no .NET needed.\n\n'
          notes+=$'Download the archive for your platform, unpack it, and run **SteamDisc** to start.\n\n'
          notes+=$'Burning is Windows-only; on Linux and macOS SteamDisc builds the ISO and you burn it with your own tool.'

          gh release create "$tag" artifacts/*/* \
            --draft \
            --title "SteamDisc $tag" \
            --notes "$notes"
